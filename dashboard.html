<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integrity Mod Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* Reset */
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family:'Inter',sans-serif;
    display:flex;
    min-height:100vh;
    color:white;
    background: linear-gradient(135deg,#001f4d,#000814);
    background-size:400% 400%;
    animation: gradientPulse 20s ease infinite;
  }

  @keyframes gradientPulse {
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  nav {
    width:250px;
    background:#0f1a40;
    padding:20px;
    display:flex;
    flex-direction:column;
    animation: fadeIn 1s ease forwards;
  }

  nav h2 {
    font-family:'Montserrat',sans-serif;
    font-weight:900;
    font-size:22px;
    margin-bottom:30px;
  }

  nav a {
    color:white;
    text-decoration:none;
    margin-bottom:15px;
    padding:10px;
    border-radius:6px;
    transition:0.2s;
  }

  nav a:hover {
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    color:black;
    box-shadow:0 0 10px #00c6ff;
  }

  main {
    flex:1;
    padding:40px;
    overflow-y:auto;
  }

  h1,h2,h3,h4 { font-family:'Montserrat',sans-serif; }

  section {
    margin-bottom:50px;
    opacity:0;
    transform: translateY(40px);
    transition: all 0.8s ease;
  }

  section.visible {
    opacity:1;
    transform: translateY(0);
  }

  /* Inputs, selects, textareas dark theme */
  input, select, textarea {
    padding:10px;
    margin:5px 0;
    border-radius:6px;
    border:none;
    font-size:16px;
    width:100%;
    background-color:#0f1a40;
    color:white;
  }

  input::placeholder,
  textarea::placeholder {
    color:#a0a0a0;
  }

  /* Buttons */
  button {
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
    padding:12px;
    border-radius:6px;
    margin-top:8px;
  }

  button:hover {
    transform: scale(1.03);
    box-shadow:0 0 20px #00c6ff;
  }

  /* Tables */
  table {
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
  }

  th,td {
    border:1px solid #00c6ff;
    padding:8px;
    text-align:left;
  }

  th {
    background:#001f4d;
  }

  @keyframes fadeIn { from {opacity:0; transform:translateY(30px);} to {opacity:1; transform:translateY(0);} }

  /* Responsive */
  @media (max-width:768px){
    nav { width:200px; }
    main { padding:20px; }
  }

  /* Shift Section Styles */
  #shifts div { display:flex; gap:20px; flex-wrap:wrap; margin-top:10px; }
  #shifts h4 { margin-bottom:10px; }
  #shifts ul { list-style:none; padding-left:0; }
</style>
</head>
<body>

<nav>
  <h2>Integrity Panel</h2>
  <a href="#player-search">Player Search</a>
  <a href="#moderation">Moderation Actions</a>
  <a href="#logs">Logs</a>
  <a href="#shifts">Shifts</a>
  <a href="#run-command">Run Command</a>
</nav>

<main>
  <section id="player-search">
    <h3>Player Search</h3>
    <input type="text" placeholder="Enter Player Name or ID" id="playerInput">
    <button onclick="searchPlayer()">Search Player</button>
    <div id="playerResult" style="margin-top:15px;"></div>
  </section>

  <section id="moderation">
    <h3>Moderation Actions</h3>
    <select id="modAction">
      <option value="warn">Warn</option>
      <option value="kick">Kick</option>
      <option value="ban">Ban</option>
    </select>
    <input type="text" placeholder="Target Player ID" id="modPlayerId">
    <textarea placeholder="Reason (optional)" id="modReason"></textarea>
    <button onclick="executeModeration()">Execute Action</button>
    <div id="modResult" style="margin-top:15px;"></div>
  </section>

  <section id="logs">
    <h3>Logs</h3>
    <table>
      <thead>
        <tr><th>Time</th><th>Staff</th><th>Action</th><th>Target</th><th>Reason</th></tr>
      </thead>
      <tbody id="logsTable"></tbody>
    </table>
  </section>

  <section id="shifts">
    <h3>Shift Management</h3>
    <div>
      <button id="clockInBtn" onclick="clockIn()">Clock In</button>
      <button id="clockOutBtn" onclick="clockOut()">Clock Out</button>
      
      <div style="flex:1; min-width:250px;">
        <h4>Current Shift</h4>
        <p id="currentShift">Not clocked in</p>
      </div>
      
      <div style="flex:1; min-width:250px;">
        <h4>Past Shifts</h4>
        <ul id="shiftHistory"></ul>
      </div>
    </div>
  </section>

  <section id="run-command">
    <h3>Run Command</h3>
    <input type="text" placeholder="Command to run in-game" id="commandInput">
    <button onclick="runCommand()">Run Command</button>
    <div id="commandResult" style="margin-top:15px;"></div>
  </section>
</main>

<script>
  // Fade-in sections on scroll
  const sections = document.querySelectorAll('section');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting) entry.target.classList.add('visible');
    });
  }, {threshold:0.2});
  sections.forEach(section => observer.observe(section));

  // Placeholder JS for demo
  function searchPlayer(){
    const input = document.getElementById('playerInput').value;
    document.getElementById('playerResult').innerHTML = "Searched player: <b>"+input+"</b> (Demo)";
  }

  function executeModeration(){
    const action = document.getElementById('modAction').value;
    const player = document.getElementById('modPlayerId').value;
    const reason = document.getElementById('modReason').value;
    document.getElementById('modResult').innerHTML = `Action: <b>${action}</b> executed on <b>${player}</b>. Reason: ${reason || 'N/A'} (Demo)`;

    const logs = document.getElementById('logsTable');
    const row = logs.insertRow(0);
    row.innerHTML = `<td>${new Date().toLocaleString()}</td><td>StaffUser</td><td>${action}</td><td>${player}</td><td>${reason || 'N/A'}</td>`;
  }

  function runCommand(){
    const cmd = document.getElementById('commandInput').value;
    document.getElementById('commandResult').innerHTML = `Command "<b>${cmd}</b>" executed (Demo)`;
  }

  // Shift management
  let shiftStart = null;
  const shiftHistory = [];

  function clockIn(){
    if(shiftStart){
      alert("Already clocked in!");
      return;
    }
    shiftStart = new Date();
    document.getElementById('currentShift').innerText = `Clocked in at: ${shiftStart.toLocaleTimeString()}`;
  }

  function clockOut(){
    if(!shiftStart){
      alert("You must clock in first!");
      return;
    }
    const shiftEnd = new Date();
    const duration = ((shiftEnd - shiftStart)/1000/60).toFixed(1); // minutes
    const entry = `Shift: ${shiftStart.toLocaleTimeString()} - ${shiftEnd.toLocaleTimeString()} (${duration} mins)`;
    
    shiftHistory.push(entry);
    const ul = document.getElementById('shiftHistory');
    const li = document.createElement('li');
    li.innerText = entry;
    ul.prepend(li); // newest first
    
    document.getElementById('currentShift').innerText = "Not clocked in";
    shiftStart = null;
  }
</script>

</body>
</html>
